services:
  - type: web
    name: focus-stockroom
    runtime: node
    plan: free
    branch: main
    autoDeployTrigger: checksPass
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
